        specialisations:
          type: array
          items:
            type: string
            maxLength: 120
          maxItems: 30
          nullable: true
        maraNumber:
          type: string
          maxLength: 20
          nullable: true

    AgentFullResponse:
      allOf:
        - type: object
          properties:
            id:
              type: string
