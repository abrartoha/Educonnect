          items:
            type: string
          nullable: true
        languages:
          type: array
          items:
            type: string
          nullable: true
        specialisations:
          type: array
          items:
            type: string
          nullable: true
        hourlyRate:
          type: integer
          nullable: true
        verified:
          type: boolean
        rating:
          type: number
          format: float
          nullable: true

    ConsultantProfileUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        phone:
          type: string
          maxLength: 40
          nullable: true
        location:
          type: string
          maxLength: 120
          nullable: true
        description:
          type: string
          maxLength: 2000
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        yearsExperience:
          type: integer
          minimum: 0
          maximum: 80
          nullable: true
        qualifications:
          type: array
          items:
            type: string
            maxLength: 120
          maxItems: 30
          nullable: true
        services:
          type: array
          items:
            type: string
            maxLength: 120
          maxItems: 30
          nullable: true
        languages:
          type: array
          items:
            type: string
            maxLength: 60
          maxItems: 20
          nullable: true
        specialisations:
          type: array
          items:
            type: string
            maxLength: 120
          maxItems: 30
          nullable: true
