              $ref: '#/components/schemas/AgentProfileFields'

    ConsultantItem:
      allOf:
        - $ref: '#/components/schemas/DirectoryItem'
        - type: object
          properties:
            consultant:
              $ref: '#/components/schemas/ConsultantProfileFields'

    ConsultantProfileFields:
      type: object
      properties:
