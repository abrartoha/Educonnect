openapi: 3.1.0
info:
  title: EduConnect Directory API
  version: 1.0.0
  description: Public directory listings and profile management for universities, agents, consultants, and students.

servers:
  - url: http://localhost:5000
    description: Development server

tags:
  - name: Universities
    description: University directory listings and profile management
  - name: Agents
    description: Agent directory listings and profile management
  - name: Consultants
    description: Consultant directory listings and profile management
  - name: Students
    description: Student profile management (self only)

paths:
  /api/universities:
    get:
      tags: [Universities]
      summary: List universities
      description: Paginated, filterable list of active university accounts.
      operationId: listUniversities
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/verified'
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          description: Paginated university list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectoryListResponse'
              example:
                items:
                  - id: clx123abc
                    name: University of Melbourne
                    email: admissions@unimelb.edu.au
                    avatarUrl: https://example.com/logo.png
                    createdAt: '2025-01-15T09:00:00Z'
                    university:
                      description: Leading research university in Australia
                      location: Melbourne, VIC
                      verified: true
                      rating: 4.8
                page: 1
                limit: 20
                total: 42
                pages: 3

  /api/universities/compare:
    get:
      tags: [Universities]
      summary: Compare universities
      description: Compare 2–3 universities by ID. Missing or suspended entries are silently skipped. Response preserves caller order.
      operationId: compareUniversities
      parameters:
        - name: ids
          in: query
          required: true
          description: Comma-separated CUID list of university IDs (2–3)
          schema:
            type: string
          example: clx123abc,clx456def,clx789ghi
      responses:
        '200':
          description: Ordered comparison items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/UniversityItem'
              example:
                items:
                  - id: clx123abc
                    name: University of Melbourne
                    university:
                      description: Leading research university
                      location: Melbourne, VIC
                      verified: true
                      rating: 4.8
                  - id: clx456def
                    name: University of Sydney
                    university:
                      description: World-class research institution
                      location: Sydney, NSW
                      verified: true
                      rating: 4.6

  /api/universities/{id}:
    get:
      tags: [Universities]
      summary: Get university by ID
      operationId: getUniversity
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: University profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/UniversityItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/universities/me:
    patch:
      tags: [Universities]
      summary: Update own university profile
      description: Authenticated university account updates its own profile. Requires CSRF token.
      operationId: updateUniversityProfile
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniversityProfileUpdate'
            example:
              name: University of Melbourne
              shortName: UniMelb
              location: Melbourne, VIC, Australia
              type: Public
              description: A world-leading university with a global reputation for excellence in research and education.
              website: https://www.unimelb.edu.au
              phone: +61-3-9035-4000
              logoUrl: https://example.com/logo.png
              coverImageUrl: https://example.com/cover.jpg
              foundedYear: 1853
              studentCount: 52000
              internationalPct: 40
              ranking: 33
              tuitionMin: 35000
              tuitionMax: 85000
              tuitionCurrency: AUD
              courses: [Computer Science, Business, Law, Medicine, Engineering]
              scholarships: [Melbourne International Scholarship, Graduate Research Scholarship]
              intakes: [February, July]
              facilities: [Library, Sports Centre, Research Labs, Student Housing]
              accreditations: [AACSB, EQUIS, AMBA]
      responses:
        '200':
          description: Updated profile returned with full profile relation
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UniversityFullResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/agents:
    get:
      tags: [Agents]
      summary: List agents
      operationId: listAgents
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/verified'
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          description: Paginated agent list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectoryListResponse'

  /api/agents/{id}:
    get:
      tags: [Agents]
      summary: Get agent by ID
      operationId: getAgent
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Agent profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/AgentItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/agents/me:
    patch:
      tags: [Agents]
      summary: Update own agent profile
      operationId: updateAgentProfile
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentProfileUpdate'
            example:
              name: Pacific Education
              contactPerson: Sarah Johnson
              phone: +61-2-9123-4567
              location: Sydney, NSW, Australia
              description: Leading education agent serving international students since 2010.
              website: https://pacificedu.com.au
              logoUrl: https://example.com/logo.png
              yearsExperience: 14
              certifications: [QEAC, MARA Licensed]
              services: [Visa Guidance, Course Selection, Application Support]
              languages: [English, Mandarin, Hindi]
              specialisations: [Undergraduate, Postgraduate, Vocational Education]
              maraNumber: MARA-2010-1234
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/AgentFullResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/consultants:
    get:
      tags: [Consultants]
      summary: List consultants
      operationId: listConsultants
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/verified'
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          description: Paginated consultant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectoryListResponse'

  /api/consultants/{id}:
    get:
      tags: [Consultants]
      summary: Get consultant by ID
      operationId: getConsultant
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Consultant profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/ConsultantItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/consultants/me:
    patch:
      tags: [Consultants]
      summary: Update own consultant profile
      operationId: updateConsultantProfile
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultantProfileUpdate'
            example:
              name: Emma Thompson
              phone: +61-4-1234-5678
              location: Brisbane, QLD, Australia
              description: Independent education consultant with 8+ years helping international students find the right path.
              website: https://educonsult.com.au
              yearsExperience: 8
              qualifications: [Masters in Education, QBEA Member]
              services: [Career Counselling, University Selection, Visa Application]
              languages: [English, Spanish]
              specialisations: [Undergraduate, Masters Programs, PhD Applications]
              hourlyRate: 120
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/ConsultantFullResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/students/me:
    patch:
      tags: [Students]
      summary: Update own student profile
      description: Authenticated student updates their own profile. Not part of a public directory.
      operationId: updateStudentProfile
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentProfileUpdate'
            example:
              name: Arun Kumar
              phone: +91-9876-543210
              nationality: Indian
              currentEducation: Bachelor's in Computer Science (3rd year)
              interestedIn: [Computer Science, Data Science, AI/ML]
              preferredLocations: [Australia, Canada]
              budgetMin: 30000
              budgetMax: 60000
              bio: Passionate about technology and looking for postgraduate programs in AI.
              intakeTarget: February 2026
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/StudentFullResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  parameters:
    page:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1

    limit:
      name: limit
      in: query
      description: Records per page (max 60)
      schema:
        type: integer
        minimum: 1
        maximum: 60
        default: 20

    q:
      name: q
      in: query
      description: Full-text search (matches name or description)
      schema:
        type: string
        maxLength: 120

    verified:
      name: verified
      in: query
      description: Filter by verified status
      schema:
        type: string
        enum: [true, false]

    location:
      name: location
      in: query
      description: Case-insensitive location filter
      schema:
        type: string
        maxLength: 120

    sort:
      name: sort
      in: query
      description: Sort order
      schema:
        type: string
        enum: [rating, name, newest]
        default: rating

    id:
      name: id
      in: path
      required: true
      description: User/Entity CUID
      schema:
        type: string
        pattern: ^[a-z][a-z0-9]+$
      example: clx123abc456def789ghi

  schemas:
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Records per page for this request
        total:
          type: integer
          description: Total matching records
        pages:
          type: integer
          description: Total number of pages

    DirectoryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DirectoryItem'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer

    DirectoryItem:
      type: object
      properties:
        id:
          type: string
          description: User CUID
        name:
          type: string
        email:
          type: string
          description: 'Note: Returned on all public listings — potential PII concern (see findings)'
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    UniversityItem:
      allOf:
        - $ref: '#/components/schemas/DirectoryItem'
        - type: object
          properties:
            university:
              $ref: '#/components/schemas/UniversityProfileFields'

    UniversityProfileFields:
      type: object
      properties:
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        foundedYear:
          type: integer
          nullable: true
        studentCount:
          type: integer
          nullable: true
        internationalPct:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        ranking:
          type: integer
          nullable: true
        tuitionMin:
          type: integer
          nullable: true
        tuitionMax:
          type: integer
          nullable: true
        tuitionCurrency:
          type: string
          nullable: true
        courses:
          type: array
          items:
            type: string
          nullable: true
        scholarships:
          type: array
          items:
            type: string
          nullable: true
        intakes:
          type: array
          items:
            type: string
          nullable: true
        facilities:
          type: array
          items:
            type: string
          nullable: true
        accreditations:
          type: array
          items:
            type: string
          nullable: true
        verified:
          type: boolean
        rating:
          type: number
          format: float
          nullable: true
        views:
          type: integer
          description: View counter (marketing metric)

    UniversityProfileUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
        shortName:
          type: string
          maxLength: 40
          nullable: true
        location:
          type: string
          maxLength: 120
          nullable: true
        type:
          type: string
          maxLength: 60
          nullable: true
        description:
          type: string
          maxLength: 2000
          nullable: true
        website:
          type: string
          format: uri
          maxLength: 500
          nullable: true
        phone:
          type: string
          maxLength: 40
          nullable: true
        logoUrl:
          type: string
          format: uri
          maxLength: 500
          nullable: true
        coverImageUrl:
          type: string
          format: uri
          maxLength: 500
          nullable: true
        foundedYear:
          type: integer
          minimum: 1000
          maximum: 2100
          nullable: true
        studentCount:
          type: integer
          minimum: 0
          maximum: 1000000
          nullable: true
        internationalPct:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        ranking:
          type: integer
          minimum: 1
          maximum: 100000
          nullable: true
        tuitionMin:
          type: integer
          minimum: 0
          maximum: 1000000
          nullable: true
        tuitionMax:
          type: integer
          minimum: 0
          maximum: 1000000
          nullable: true
        tuitionCurrency:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 currency code
          nullable: true
        courses:
          type: array
          items:
            type: string
            maxLength: 120
          maxItems: 200
          nullable: true
        scholarships:
          type: array
          items:
            type: string
            maxLength: 200
          maxItems: 100
          nullable: true
        intakes:
          type: array
          items:
            type: string
            maxLength: 80
          maxItems: 20
          nullable: true
        facilities:
          type: array
          items:
            type: string
            maxLength: 120
          maxItems: 100
          nullable: true
        accreditations:
          type: array
          items:
            type: string
            maxLength: 120
          maxItems: 50
          nullable: true

    UniversityFullResponse:
      allOf:
        - type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
            avatarUrl:
              type: string
              nullable: true
        - type: object
          properties:
            university:
              $ref: '#/components/schemas/UniversityProfileFields'

    AgentItem:
      allOf:
        - $ref: '#/components/schemas/DirectoryItem'
        - type: object
          properties:
            agent:
              $ref: '#/components/schemas/AgentProfileFields'

    AgentProfileFields:
      type: object
      properties:
        contactPerson:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        yearsExperience:
          type: integer
          nullable: true
        certifications:
          type: array
          items:
            type: string
          nullable: true
        services:
          type: array
          items:
            type: string
          nullable: true
        languages:
          type: array
          items:
            type: string
          nullable: true
        specialisations:
          type: array
          items:
            type: string
          nullable: true
        maraNumber:
          type: string
          nullable: true
        verified:
          type: boolean
        rating:
          type: number
          format: float
          nullable: true

    AgentProfileUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        contactPerson:
          type: string
          maxLength: 120
          nullable: true
        phone:
          type: string
          maxLength: 40
          nullable: true
        location:
          type: string
          maxLength: 120
          nullable: true
        description:
          type: string
          maxLength: 2000
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        logoUrl:
          type: string
          format: uri
          maxLength: 500
          nullable: true
        yearsExperience:
          type: integer
          minimum: 0
          maximum: 80
          nullable: true
        certifications:
          type: array
          items:
            type: string
            maxLength: 120
          maxItems: 30
          nullable: true
        services:
          type: array
          items:
            type: string
            maxLength: 120
          maxItems: 30
          nullable: true
        languages:
          type: array
          items:
            type: string
            maxLength: 60
