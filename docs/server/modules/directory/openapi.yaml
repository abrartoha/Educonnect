          type: integer
          minimum: 0
          maximum: 10000
          nullable: true

    ConsultantFullResponse:
      allOf:
        - type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
            avatarUrl:
              type: string
              nullable: true
        - type: object
          properties:
            consultant:
              $ref: '#/components/schemas/ConsultantProfileFields'

    StudentProfileUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        phone:
          type: string
          maxLength: 40
          nullable: true
        nationality:
          type: string
          maxLength: 80
          nullable: true
        currentEducation:
          type: string
          maxLength: 120
          nullable: true
        interestedIn:
          type: array
          items:
            type: string
            maxLength: 80
          maxItems: 20
          nullable: true
        preferredLocations:
          type: array
          items:
            type: string
            maxLength: 80
          maxItems: 20
          nullable: true
        budgetMin:
          type: integer
          minimum: 0
          nullable: true
        budgetMax:
          type: integer
          minimum: 0
          nullable: true
        bio:
          type: string
          maxLength: 1000
          nullable: true
        intakeTarget:
          type: string
          maxLength: 80
          nullable: true

    StudentFullResponse:
      allOf:
        - type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
            avatarUrl:
              type: string
              nullable: true
        - type: object
          properties:
            student:
              type: object
              properties:
                phone:
                  type: string
                  nullable: true
                nationality:
                  type: string
                  nullable: true
                currentEducation:
                  type: string
                  nullable: true
                interestedIn:
                  type: array
                  items:
                    type: string
                  nullable: true
                preferredLocations:
                  type: array
                  items:
                    type: string
                  nullable: true
                budgetMin:
                  type: integer
                  nullable: true
                budgetMax:
                  type: integer
                  nullable: true
                bio:
                  type: string
                  nullable: true
                intakeTarget:
                  type: string
                  nullable: true

    Error:
      type: object
      properties:
        message:
          type: string
        statusCode:
          type: integer

    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: Validation failed
        statusCode:
          type: integer
          example: 400
        errors:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
                example: body.tuitionMin
              message:
                type: string
                example: Number must be greater than or equal to 0

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Unauthorized
            statusCode: 401

    Forbidden:
      description: Authenticated but insufficient role permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Forbidden
            statusCode: 403

    NotFound:
      description: Resource not found or not ACTIVE
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: University not found
            statusCode: 404

    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

  securitySchemes:
    cookieAuth:
      type: apiKey
      name: access_token
      in: cookie
      description: httpOnly signed cookie set by /api/auth/login. Web SPA only.

    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token. Mobile/programmatic clients. No CSRF needed.