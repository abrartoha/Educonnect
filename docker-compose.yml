services:
  redis:
    image: redis:7-alpine
    container_name: educonnect-redis
    restart: unless-stopped
    command: redis-server --requirepass RedisPass123!
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "RedisPass123!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: teraquency007/educonnect-server:latest
    container_name: educonnect-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    image: teraquency007/educonnect-client:latest
    container_name: educonnect-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  redis_data:
